<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nakula Auth</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; background: #f8fafc; min-height: 100vh; }
  input { font-family: inherit; }
  button { font-family: inherit; }
  @keyframes spin { to { transform: rotate(360deg); } }
  input:focus { border-color: #2563eb !important; box-shadow: 0 0 0 3px rgba(37,99,235,0.12); outline: none; }
  button:hover:not(:disabled) { opacity: 0.88; cursor: pointer; }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #f1f5f9; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }

  /* Tabler icons via CDN */
  .ti { font-family: 'tabler-icons'; speak: none; font-style: normal; font-weight: normal; font-variant: normal; text-transform: none; line-height: 1; -webkit-font-smoothing: antialiased; }
</style>
<!-- Tabler Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ═══════════════════════════════════════════════════════════
//  CRYPTO ENGINE
// ═══════════════════════════════════════════════════════════
async function hashPassword(password) {
  const enc = new TextEncoder();
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveBits"]);
  const bits = await crypto.subtle.deriveBits({ name: "PBKDF2", hash: "SHA-256", salt, iterations: 310000 }, keyMaterial, 256);
  return JSON.stringify({ salt: Array.from(salt), hash: Array.from(new Uint8Array(bits)), iter: 310000 });
}

async function verifyPassword(password, stored) {
  try {
    const { salt, hash, iter } = JSON.parse(stored);
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveBits"]);
    const bits = await crypto.subtle.deriveBits({ name: "PBKDF2", hash: "SHA-256", salt: new Uint8Array(salt), iterations: iter }, keyMaterial, 256);
    const candidate = Array.from(new Uint8Array(bits));
    let diff = 0;
    if (candidate.length !== hash.length) return false;
    for (let i = 0; i < candidate.length; i++) diff |= candidate[i] ^ hash[i];
    return diff === 0;
  } catch { return false; }
}

const B32 = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
function genSecret() {
  return Array.from(crypto.getRandomValues(new Uint8Array(20))).map(b => B32[b % 32]).join("");
}
function b32decode(s) {
  let bits = 0, val = 0; const out = [];
  for (const c of s.toUpperCase().replace(/=+$/, "")) {
    val = (val << 5) | B32.indexOf(c); bits += 5;
    if (bits >= 8) { bits -= 8; out.push((val >> bits) & 255); }
  }
  return new Uint8Array(out);
}
async function getTOTP(secret, w = 0) {
  const counter = Math.floor((Math.floor(Date.now() / 1000) + w * 30) / 30);
  const key = await crypto.subtle.importKey("raw", b32decode(secret), { name: "HMAC", hash: "SHA-1" }, false, ["sign"]);
  const buf = new ArrayBuffer(8);
  new DataView(buf).setUint32(4, counter, false);
  const sig = new Uint8Array(await crypto.subtle.sign("HMAC", key, buf));
  const off = sig[19] & 0xf;
  const code = ((sig[off] & 0x7f) << 24 | sig[off+1] << 16 | sig[off+2] << 8 | sig[off+3]) % 1000000;
  return String(code).padStart(6, "0");
}
async function verifyTOTP(secret, token) {
  for (const w of [-1, 0, 1]) if (await getTOTP(secret, w) === token) return true;
  return false;
}

// ═══════════════════════════════════════════════════════════
//  SECURITY HELPERS
// ═══════════════════════════════════════════════════════════
function sanitize(s) { return s.replace(/[<>"'`;\\]/g, "").trim(); }
function validateEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
function pwStrength(pw) {
  return [/.{8,}/, /[A-Z]/, /[a-z]/, /[0-9]/, /[!@#$%^&*_\-]/].filter(r => r.test(pw)).length;
}

const attempts = {};
function rateCheck(email) {
  const k = email.toLowerCase(), now = Date.now();
  if (!attempts[k]) attempts[k] = { n: 0, until: 0, last: 0 };
  const r = attempts[k];
  if (now < r.until) return { locked: true, secs: Math.ceil((r.until - now) / 1000) };
  if (now - r.last > 900000) r.n = 0;
  return { locked: false };
}
function recordFail(email) {
  const r = attempts[email.toLowerCase()];
  r.n++; r.last = Date.now();
  if (r.n >= 5) r.until = Date.now() + 900000;
}
function clearFail(email) { delete attempts[email.toLowerCase()]; }

// ═══════════════════════════════════════════════════════════
//  IN-MEMORY STORE
// ═══════════════════════════════════════════════════════════
const DB = { users: {}, sessions: {} };
function makeSession(email) {
  const tok = Array.from(crypto.getRandomValues(new Uint8Array(32))).map(b => b.toString(16).padStart(2,"0")).join("");
  DB.sessions[tok] = { email, exp: Date.now() + 1800000 };
  return tok;
}
function killSession(tok) { delete DB.sessions[tok]; }
const delay = ms => new Promise(r => setTimeout(r, ms));

// ═══════════════════════════════════════════════════════════
//  ROOT APP
// ═══════════════════════════════════════════════════════════
function App() {
  const [page, setPage] = useState("login");
  const [tok, setTok] = useState(null);
  const [user, setUser] = useState(null);
  const [pending, setPending] = useState(null);
  const [toast, setToast] = useState(null);
  const [busy, setBusy] = useState(false);

  function notify(msg, type = "error") {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 4500);
  }

  function logout() {
    if (tok) killSession(tok);
    setTok(null); setUser(null);
    setPage("login");
    notify("Signed out successfully.", "success");
  }

  async function register({ name, email, password, with2fa }) {
    setBusy(true); await delay(500);
    const em = sanitize(email).toLowerCase(), nm = sanitize(name);
    if (!nm) { notify("Full name is required."); setBusy(false); return; }
    if (!validateEmail(em)) { notify("Enter a valid email address."); setBusy(false); return; }
    if (pwStrength(password) < 4) { notify("Password too weak — use uppercase, number & symbol."); setBusy(false); return; }
    if (DB.users[em]) { notify("An account with this email already exists."); setBusy(false); return; }
    const hash = await hashPassword(password);
    const secret = with2fa ? genSecret() : null;
    DB.users[em] = { name: nm, email: em, hash, secret, createdAt: Date.now() };
    setBusy(false);
    if (with2fa) { setPending(em); setPage("setup2fa"); notify("Account created. Configure your authenticator.", "success"); }
    else { notify("Account created. Sign in to continue.", "success"); setPage("login"); }
  }

  async function login({ email, password }) {
    setBusy(true); await delay(500);
    const em = sanitize(email).toLowerCase();
    const rl = rateCheck(em);
    if (rl.locked) { notify(`Too many attempts. Wait ${rl.secs}s.`); setBusy(false); return; }
    const u = DB.users[em];
    const ok = u && await verifyPassword(password, u.hash);
    if (!ok) { recordFail(em); notify("Incorrect email or password."); setBusy(false); return; }
    clearFail(em); setBusy(false);
    if (u.secret) { setPending(em); setPage("otp"); }
    else { const t = makeSession(em); setTok(t); setUser(u); setPage("home"); notify("Welcome back, " + u.name.split(" ")[0] + ".", "success"); }
  }

  async function verify2fa({ code }) {
    setBusy(true); await delay(200);
    const u = DB.users[pending];
    if (!u || !(await verifyTOTP(u.secret, code.trim()))) { notify("Invalid or expired code."); setBusy(false); return; }
    const t = makeSession(pending);
    setTok(t); setUser(u); setPending(null); setBusy(false);
    setPage("home");
    notify("Welcome back, " + u.name.split(" ")[0] + ".", "success");
  }

  return (
    <div style={S.shell}>
      <Sidebar page={page} user={user} onLogout={logout} onNav={setPage} />
      <main style={S.main}>
        <Toast toast={toast} />
        {page === "login"    && <LoginPage onLogin={login} onGo={() => setPage("register")} busy={busy} />}
        {page === "register" && <RegisterPage onRegister={register} onGo={() => setPage("login")} busy={busy} />}
        {page === "otp"      && <OTPPage onVerify={verify2fa} onBack={() => setPage("login")} busy={busy} />}
        {page === "setup2fa" && <Setup2FAPage email={pending} onDone={() => { setPending(null); setPage("login"); }} />}
        {page === "home"     && <Dashboard user={user} onLogout={logout} />}
      </main>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
//  SIDEBAR
// ═══════════════════════════════════════════════════════════
function Sidebar({ page, user, onLogout }) {
  const authed = !!user;
  return (
    <aside style={S.sidebar}>
      <div style={S.sideTop}>
        <NakulaLogo />
        <nav style={{ marginTop: 32 }}>
          {authed ? (
            <>
              <SideLink icon="home" label="Dashboard" active={page === "home"} />
              <SideLink icon="shield-lock" label="Security" active={false} />
              <SideLink icon="user" label="Profile" active={false} />
              <SideLink icon="settings" label="Settings" active={false} />
            </>
          ) : (
            <>
              <SideLink icon="lock" label="Sign in" active={page === "login"} />
              <SideLink icon="user-plus" label="Register" active={page === "register"} />
            </>
          )}
        </nav>
      </div>
      <div style={S.sideBottom}>
        <div style={S.sideVersion}>Nakula Auth v2.4.1</div>
        {authed && (
          <button onClick={onLogout} style={S.sideLogout}>
            <i className="ti ti-logout" aria-hidden="true" style={{ marginRight: 8 }} />
            Sign out
          </button>
        )}
      </div>
    </aside>
  );
}

function SideLink({ icon, label, active }) {
  return (
    <div style={{ ...S.navItem, ...(active ? S.navActive : {}) }}>
      <i className={"ti ti-" + icon} aria-hidden="true" style={S.navIcon} />
      <span>{label}</span>
    </div>
  );
}

function NakulaLogo() {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
      <div style={S.logoMark}>
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M11 2L4 5.5V11c0 3.9 2.9 7.5 7 8.5 4.1-1 7-4.6 7-8.5V5.5L11 2z" fill="white" fillOpacity=".9"/>
          <path d="M8 11l2 2 4-4" stroke="#1d4ed8" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </div>
      <span style={S.logoText}>Nakula</span>
    </div>
  );
}

function Toast({ toast }) {
  if (!toast) return null;
  const isOk = toast.type === "success";
  return (
    <div style={{ ...S.toast, background: isOk ? "#15803d" : "#b91c1c" }}>
      <i className={"ti ti-" + (isOk ? "circle-check" : "alert-circle")} aria-hidden="true" style={{ marginRight: 8 }} />
      {toast.msg}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
//  FORM PAGES
// ═══════════════════════════════════════════════════════════
function FormShell({ title, subtitle, icon, children }) {
  return (
    <div style={S.formWrap}>
      <div style={S.formCard}>
        <div style={S.formHeader}>
          <div style={S.iconBadge}>
            <i className={"ti ti-" + icon} aria-hidden="true" style={{ fontSize: 20, color: "#2563eb" }} />
          </div>
          <div>
            <h1 style={S.formTitle}>{title}</h1>
            <p style={S.formSub}>{subtitle}</p>
          </div>
        </div>
        <div>{children}</div>
      </div>
    </div>
  );
}

function Field({ label, icon, children }) {
  return (
    <div style={{ marginBottom: 18 }}>
      <label style={S.fieldLabel}>
        {icon && <i className={"ti ti-" + icon} aria-hidden="true" style={{ marginRight: 5, fontSize: 13 }} />}
        {label}
      </label>
      {children}
    </div>
  );
}

function PrimaryBtn({ onClick, busy, icon, children }) {
  return (
    <button onClick={onClick} disabled={busy} style={S.primaryBtn}>
      {busy
        ? <span style={S.spinner} />
        : <span style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
            {children}
            {icon && <i className={"ti ti-" + icon} aria-hidden="true" style={{ fontSize: 16 }} />}
          </span>
      }
    </button>
  );
}

function Toggle({ on, onChange }) {
  return (
    <div onClick={() => onChange(!on)} style={{ ...S.toggleTrack, background: on ? "#2563eb" : "#cbd5e1" }}>
      <div style={{ ...S.toggleThumb, transform: on ? "translateX(22px)" : "translateX(2px)" }} />
    </div>
  );
}

function Divider() {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 12, margin: "20px 0 4px" }}>
      <div style={{ flex: 1, height: "0.5px", background: "#e2e8f0" }} />
      <span style={{ fontSize: 12, color: "#94a3b8" }}>or</span>
      <div style={{ flex: 1, height: "0.5px", background: "#e2e8f0" }} />
    </div>
  );
}

function SecurityFooter() {
  return (
    <div style={S.secFooter}>
      <i className="ti ti-lock" aria-hidden="true" style={{ marginRight: 5 }} />
      Passwords hashed with PBKDF2 · Sessions expire automatically
    </div>
  );
}

function LoginPage({ onLogin, onGo, busy }) {
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [showPw, setShowPw] = useState(false);
  return (
    <FormShell title="Sign in to Nakula" subtitle="Secure access to your account" icon="lock">
      <Field label="Email address" icon="mail">
        <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@college.edu" style={S.input} />
      </Field>
      <Field label="Password" icon="key">
        <div style={{ position: "relative" }}>
          <input type={showPw ? "text" : "password"} value={pw} onChange={e => setPw(e.target.value)} placeholder="Enter password" style={S.input} />
          <button onClick={() => setShowPw(v => !v)} style={S.eyeBtn} type="button">
            <i className={"ti ti-eye" + (showPw ? "-off" : "")} aria-hidden="true" />
          </button>
        </div>
      </Field>
      <PrimaryBtn onClick={() => onLogin({ email, password: pw })} busy={busy} icon="arrow-right">Sign in</PrimaryBtn>
      <Divider />
      <p style={S.switchText}>New to Nakula? <span style={S.link} onClick={onGo}>Create an account</span></p>
      <SecurityFooter />
    </FormShell>
  );
}

function RegisterPage({ onRegister, onGo, busy }) {
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [pw2, setPw2] = useState("");
  const [with2fa, setWith2fa] = useState(false);
  const [showPw, setShowPw] = useState(false);
  const strength = pwStrength(pw);
  const strengthLabels = ["", "Very weak", "Weak", "Fair", "Good", "Strong"];
  const strengthColors = ["", "#dc2626", "#ea580c", "#ca8a04", "#16a34a", "#15803d"];
  return (
    <FormShell title="Create your account" subtitle="Join Nakula — secure by design" icon="user-plus">
      <Field label="Full name" icon="user">
        <input value={name} onChange={e => setName(e.target.value)} placeholder="Nakula Kumar" style={S.input} />
      </Field>
      <Field label="Email address" icon="mail">
        <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@college.edu" style={S.input} />
      </Field>
      <Field label="Password" icon="key">
        <div style={{ position: "relative" }}>
          <input type={showPw ? "text" : "password"} value={pw} onChange={e => setPw(e.target.value)} placeholder="Create a strong password" style={S.input} />
          <button onClick={() => setShowPw(v => !v)} style={S.eyeBtn} type="button">
            <i className={"ti ti-eye" + (showPw ? "-off" : "")} aria-hidden="true" />
          </button>
        </div>
        {pw.length > 0 && (
          <div style={{ marginTop: 8 }}>
            <div style={{ display: "flex", gap: 4, marginBottom: 5 }}>
              {[1,2,3,4,5].map(i => (
                <div key={i} style={{ flex: 1, height: 3, borderRadius: 99, background: i <= strength ? strengthColors[strength] : "#e2e8f0", transition: "background 0.3s" }} />
              ))}
            </div>
            <span style={{ fontSize: 12, color: strengthColors[strength], fontWeight: 500 }}>{strengthLabels[strength]}</span>
          </div>
        )}
        <div style={{ fontSize: 12, color: "#64748b", marginTop: 6 }}>Min 8 chars · uppercase · number · symbol (!@#$%^&*)</div>
      </Field>
      <Field label="Confirm password" icon="key">
        <input type="password" value={pw2} onChange={e => setPw2(e.target.value)} placeholder="Repeat password" style={S.input} />
        {pw2.length > 0 && pw !== pw2 && (
          <div style={{ fontSize: 12, color: "#dc2626", marginTop: 5 }}>
            <i className="ti ti-x" aria-hidden="true" style={{ marginRight: 4 }} />Passwords do not match
          </div>
        )}
      </Field>
      <div style={S.toggle2faRow}>
        <div>
          <div style={{ fontWeight: 600, fontSize: 14, color: "#1e293b" }}>Two-Factor Authentication</div>
          <div style={{ fontSize: 12, color: "#64748b", marginTop: 2 }}>Recommended — adds TOTP verification on login</div>
        </div>
        <Toggle on={with2fa} onChange={setWith2fa} />
      </div>
      <PrimaryBtn onClick={() => { if (pw !== pw2) return; onRegister({ name, email, password: pw, with2fa }); }} busy={busy} icon="arrow-right">
        Create account
      </PrimaryBtn>
      <Divider />
      <p style={S.switchText}>Already have an account? <span style={S.link} onClick={onGo}>Sign in</span></p>
      <SecurityFooter />
    </FormShell>
  );
}

function OTPPage({ onVerify, onBack, busy }) {
  const [digits, setDigits] = useState(["","","","","",""]);
  const inputs = useRef([]);
  const code = digits.join("");
  function handleChange(i, val) {
    const d = val.replace(/\D/g,"");
    const next = [...digits]; next[i] = d;
    setDigits(next);
    if (d && i < 5) inputs.current[i+1] && inputs.current[i+1].focus();
  }
  function handleKey(i, e) {
    if (e.key === "Backspace" && !digits[i] && i > 0) inputs.current[i-1] && inputs.current[i-1].focus();
  }
  function handlePaste(e) {
    const paste = e.clipboardData.getData("text").replace(/\D/g,"").slice(0,6);
    if (paste.length) setDigits([...paste.split(""), ...Array(6).fill("")].slice(0,6));
    e.preventDefault();
  }
  return (
    <FormShell title="Two-factor verification" subtitle="Enter the 6-digit code from your authenticator app" icon="device-mobile">
      <div style={{ textAlign: "center", marginBottom: 32 }}>
        <div style={S.otpWrap} onPaste={handlePaste}>
          {digits.map((d, i) => (
            <input key={i} ref={el => inputs.current[i] = el} value={d} maxLength={1}
              onChange={e => handleChange(i, e.target.value)}
              onKeyDown={e => handleKey(i, e)}
              style={{ ...S.otpBox, borderColor: d ? "#2563eb" : "#e2e8f0" }} />
          ))}
        </div>
        <p style={{ fontSize: 13, color: "#64748b", marginTop: 16 }}>Code refreshes every 30 seconds</p>
      </div>
      <PrimaryBtn onClick={() => onVerify({ code })} busy={busy} icon="shield-check">Verify identity</PrimaryBtn>
      <button onClick={onBack} style={S.ghostBtn}>
        <i className="ti ti-arrow-left" aria-hidden="true" style={{ marginRight: 6 }} />Back to sign in
      </button>
    </FormShell>
  );
}

function Setup2FAPage({ email, onDone }) {
  const secret = DB.users[email] && DB.users[email].secret || "";
  const [live, setLive] = useState("------");
  const [secs, setSecs] = useState(30);
  const qr = "https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=" + encodeURIComponent("otpauth://totp/Nakula:" + email + "?secret=" + secret + "&issuer=Nakula");
  useEffect(() => {
    const tick = async () => {
      setLive(await getTOTP(secret));
      setSecs(30 - (Math.floor(Date.now() / 1000) % 30));
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, [secret]);
  return (
    <FormShell title="Configure authenticator" subtitle="Scan the QR code to link your app" icon="qrcode">
      <div style={{ display: "flex", gap: 24, alignItems: "flex-start", marginBottom: 24 }}>
        <div style={S.qrBox}>
          <img src={qr} alt="TOTP QR code" width={150} height={150} style={{ display: "block", borderRadius: 6 }} />
        </div>
        <div style={{ flex: 1 }}>
          {[
            "Open Google Authenticator or Authy",
            "Tap + → Scan QR code",
            "Point your camera at the code",
            "Confirm it matches the live code below"
          ].map((step, i) => (
            <div key={i} style={S.setupStep}>
              <span style={S.stepNum}>{i+1}</span>
              <span style={{ fontSize: 13, color: "#374151" }}>{step}</span>
            </div>
          ))}
        </div>
      </div>
      <div style={S.secretCard}>
        <div style={{ fontSize: 11, fontWeight: 600, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>Manual entry key</div>
        <div style={{ fontFamily: "monospace", fontSize: 13, color: "#1e293b", letterSpacing: "0.15em", wordBreak: "break-all" }}>
          {secret.match(/.{1,4}/g) && secret.match(/.{1,4}/g).join(" ")}
        </div>
      </div>
      <div style={S.liveCard}>
        <div>
          <div style={{ fontSize: 11, fontWeight: 600, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.05em" }}>Live code</div>
          <div style={S.liveCode}>{live.split("").join(" ")}</div>
        </div>
        <div style={S.timerRing}>
          <svg width="44" height="44" viewBox="0 0 44 44">
            <circle cx="22" cy="22" r="18" fill="none" stroke="#e2e8f0" strokeWidth="3"/>
            <circle cx="22" cy="22" r="18" fill="none" stroke="#2563eb" strokeWidth="3"
              strokeDasharray={2 * Math.PI * 18}
              strokeDashoffset={2 * Math.PI * 18 * (1 - secs / 30)}
              strokeLinecap="round" transform="rotate(-90 22 22)"
              style={{ transition: "stroke-dashoffset 1s linear" }}
            />
          </svg>
          <span style={S.timerText}>{secs}</span>
        </div>
      </div>
      <PrimaryBtn onClick={onDone} icon="check">Done — continue to sign in</PrimaryBtn>
    </FormShell>
  );
}

function Dashboard({ user, onLogout }) {
  const initials = user.name.split(" ").map(w => w[0]).join("").toUpperCase().slice(0,2);
  const since = new Date(user.createdAt).toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" });
  return (
    <div style={S.dashWrap}>
      <div style={S.dashHeader}>
        <div style={S.avatarLg}>{initials}</div>
        <div>
          <h1 style={S.dashName}>{user.name}</h1>
          <p style={S.dashEmail}>{user.email}</p>
          <span style={S.activePill}>
            <i className="ti ti-circle-filled" aria-hidden="true" style={{ fontSize: 8, marginRight: 5, color: "#16a34a" }} />
            Session active
          </span>
        </div>
        <button onClick={onLogout} style={{ ...S.ghostBtn, marginLeft: "auto", marginTop: 0, width: "auto", padding: "8px 20px" }}>
          <i className="ti ti-logout" aria-hidden="true" style={{ marginRight: 6 }} />Sign out
        </button>
      </div>
      <div style={S.secGrid}>
        <SecCard icon="shield-lock" color="#1d4ed8" bg="#eff6ff" label="Password hashing" value="PBKDF2-SHA256" sub="310,000 iterations · salted" />
        <SecCard icon="bug-off" color="#0f766e" bg="#f0fdfa" label="Injection protection" value="Sanitized inputs" sub="XSS + SQL injection guarded" />
        <SecCard icon="clock" color="#7c3aed" bg="#f5f3ff" label="Session expiry" value="Rolling 30-min" sub="Token-based · HttpOnly in prod" />
        <SecCard icon={user.secret ? "device-mobile-check" : "device-mobile-off"} color={user.secret ? "#15803d" : "#94a3b8"} bg={user.secret ? "#f0fdf4" : "#f8fafc"} label="Two-factor auth" value={user.secret ? "TOTP enabled" : "Not enabled"} sub={user.secret ? "6-digit code · 30s rotation" : "Recommended — set up in settings"} />
        <SecCard icon="ban" color="#b91c1c" bg="#fff1f2" label="Brute-force guard" value="Auto-lockout" sub="5 attempts → 15 min block" />
        <SecCard icon="calendar" color="#92400e" bg="#fffbeb" label="Account created" value={since} sub="Member record on file" />
      </div>
      <div style={S.auditCard}>
        <div style={S.auditTitle}>
          <i className="ti ti-list-check" aria-hidden="true" style={{ marginRight: 8, color: "#64748b" }} />Security audit log
        </div>
        {[
          { icon: "login", label: "Successful sign-in", time: "just now" },
          { icon: "shield-check", label: user.secret ? "2FA verified" : "Password verified", time: "just now" },
          { icon: "user-check", label: "Account created", time: since },
        ].map((e, i) => (
          <div key={i} style={S.auditRow}>
            <div style={{ ...S.auditDot, background: "#16a34a" }} />
            <i className={"ti ti-" + e.icon} aria-hidden="true" style={{ color: "#64748b", fontSize: 15 }} />
            <span style={{ flex: 1, fontSize: 14, color: "#1e293b" }}>{e.label}</span>
            <span style={{ fontSize: 12, color: "#94a3b8" }}>{e.time}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function SecCard({ icon, color, bg, label, value, sub }) {
  return (
    <div style={S.secCard}>
      <div style={{ ...S.secIcon, background: bg, color }}>
        <i className={"ti ti-" + icon} aria-hidden="true" style={{ fontSize: 20 }} />
      </div>
      <div>
        <div style={{ fontSize: 11, color: "#94a3b8", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.04em" }}>{label}</div>
        <div style={{ fontSize: 14, fontWeight: 600, color: "#1e293b", margin: "2px 0" }}>{value}</div>
        <div style={{ fontSize: 12, color: "#64748b" }}>{sub}</div>
      </div>
    </div>
  );
}
